<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>단어장 ✦ 스마트 동기화</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F2EE; --surface: #FFFFFF; --surface2: #EFEDE8; --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16); --text: #1C1B18; --text2: #6B6860; --text3: #A8A69F;
  --accent: #3730A3; --accent-bg: #EEEEFF; --accent-mid: #6366F1; --green: #166534;
  --green-bg: #DCFCE7; --red: #991B1B; --red-bg: #FEE2E2; --yellow-bg: #FEF9C3;
  --yellow: #854D0E; --radius: 18px; --radius-sm: 12px; --radius-xs: 8px;
  --font: 'DM Sans', 'Noto Sans KR', sans-serif; --shadow: 0 2px 12px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
#app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; }
.screen { display: none; animation: fadeUp 0.22s ease; padding-bottom: 40px; }
.screen.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.topbar { display: flex; align-items: center; gap: 10px; padding: 16px 18px 4px; padding-top: calc(env(safe-area-inset-top, 0px) + 16px); }
.topbar h2 { font-size: 17px; font-weight: 700; flex: 1; }
.back-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); }
.home-header { padding: 20px 18px 12px; padding-top: calc(env(safe-area-inset-top, 0px) + 20px); }
.home-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.sync-bar { display: flex; align-items: center; gap: 8px; margin: 0 18px 16px; padding: 10px 14px; background: var(--surface); border-radius: var(--radius-xs); border: 1px solid var(--border); font-size: 12px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
.sync-dot.ok { background: var(--green); }
.sync-dot.loading { background: #CA8A04; animation: blink 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sync-label { flex: 1; color: var(--text2); }
.sync-action { font-size: 12px; font-weight: 600; color: var(--accent); background: none; border: none; cursor: pointer; }
.week-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 0 18px 12px; scrollbar-width: none; }
.week-scroll::-webkit-scrollbar { display: none; }
.week-chip { flex-shrink: 0; padding: 6px 13px; border-radius: 99px; border: 1px solid var(--border2); background: var(--surface); font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text2); transition: all 0.15s; }
.week-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 18px; }
.mc { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px 14px 14px; cursor: pointer; transition: transform 0.12s; position: relative; }
.mc:active { transform: scale(0.97); }
.mc-full { grid-column: span 2; }
.mc-hl { background: var(--accent); border-color: var(--accent); color: #fff; }
.mc-icon { font-size: 22px; margin-bottom: 8px; }
.mc-label { font-size: 14px; font-weight: 700; }
.mc-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }
.mc-hl .mc-desc { color: rgba(255,255,255,0.7); }
.prog-track { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin: 0 18px 20px; }
.prog-fill { height: 4px; background: var(--accent-mid); width: 0%; transition: width 0.3s; }
.card-box { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 34px 24px; margin: 0 18px 16px; text-align: center; }
.card-word { font-size: 30px; font-weight: 700; color: var(--accent); }
.blank-input { width: calc(100% - 36px); margin: 0 18px 10px; padding: 15px 18px; border: 2px solid var(--border2); border-radius: var(--radius-sm); font-size: 18px; font-weight: 700; text-align: center; outline: none; }
.blank-input.correct { border-color: #16A34A; background: var(--green-bg); }
.blank-input.wrong { border-color: #DC2626; background: var(--red-bg); }
.qopt { padding: 15px 18px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; font-weight: 500; transition: all 0.12s; margin: 0 18px 8px; }
.qopt.correct { background: var(--green-bg); color: var(--green); border-color: #86EFAC; }
.qopt.wrong { background: var(--red-bg); color: var(--red); border-color: #FCA5A5; }
.action-btn { display: block; width: calc(100% - 36px); margin: 0 18px; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; }
.add-card { margin: 0 18px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.add-card input { width: 100%; padding: 10px 13px; border: 1px solid var(--border2); border-radius: var(--radius-xs); margin-bottom: 10px; font-family: inherit; }
.word-row { display: flex; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--border); }
.w-en { font-weight: 700; flex: 1; }
.w-ko { color: var(--text2); flex: 1.2; font-size: 14px; }
.voice-row { display: flex; gap: 6px; padding: 0 18px 16px; }
.voice-btn { flex: 1; padding: 9px; border-radius: var(--radius-xs); border: 1px solid var(--border2); background: var(--surface); font-size: 12px; font-weight: 700; cursor: pointer; }
.voice-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; align-items: flex-end; justify-content: center; }
.modal-content { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 430px; padding: 28px 24px 40px; }
.google-btn { display: flex; align-items: center; gap: 10px; justify-content: center; width: 100%; padding: 14px; background: #fff; border: 1px solid #ddd; border-radius: 12px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
    <!-- HOME -->
    <div id="homeScreen" class="screen active">
        <div class="home-header">
            <h1>단어장 ✦</h1>
            <p id="homeSub" style="color:var(--text2); font-size:13px;">오늘도 열심히!</p>
        </div>
        <div class="sync-bar">
            <div class="sync-dot" id="syncDot"></div>
            <span class="sync-label" id="syncLabel">로그인 필요</span>
            <button class="sync-action" id="syncAction" onclick="handleSyncAction()">연결</button>
        </div>
        <div class="voice-row">
            <button class="voice-btn active" id="vf" onclick="setVoice('female')">👩 여성 음성</button>
            <button class="voice-btn" id="vm" onclick="setVoice('male')">👨 남성 음성</button>
        </div>
        <div class="week-scroll" id="weekTabs"></div>
        <div class="menu-grid">
            <div class="mc mc-hl mc-full" onclick="startTest()">
                <div class="mc-icon">🔥</div>
                <div class="mc-label">10분 실전 테스트</div>
                <div class="mc-desc">랜덤 유형 · 사운드 포함</div>
            </div>
            <div class="mc mc-full" style="background:var(--accent-bg);" onclick="startMode('super')">
                <div class="mc-icon">🚀</div>
                <div class="mc-label">플래시 주관식</div>
                <div class="mc-desc">한/영 랜덤 · 직접 입력</div>
            </div>
            <div class="mc" onclick="startMode('quiz')">
                <div class="mc-icon">✅</div>
                <div class="mc-label">객관식 퀴즈</div>
                <div class="mc-desc">뜻 고르기</div>
            </div>
            <div class="mc" onclick="startReview()">
                <div class="mc-icon">🔁</div>
                <div class="mc-label">오답 복습</div>
                <div class="mc-desc" id="wrongLabel">0개</div>
            </div>
            <div class="mc mc-full" onclick="goManage()">
                <div class="mc-icon">📝</div>
                <div class="mc-label">단어 관리</div>
                <div class="mc-desc" id="wordLabel">관리 및 추가</div>
            </div>
        </div>
    </div>

    <!-- GAME -->
    <div id="gameScreen" class="screen">
        <div class="topbar">
            <button class="back-btn" onclick="confirmExit()">←</button>
            <h2 id="gameTitle">학습 중</h2>
            <span id="gameCounter" style="font-size:12px; color:var(--text3); font-weight:700"></span>
        </div>
        <div class="prog-track"><div id="gameBar" class="prog-fill"></div></div>
        <div id="gameArea"></div>
    </div>

    <!-- RESULT -->
    <div id="resultScreen" class="screen">
        <div class="topbar"><h2>결과</h2></div>
        <div style="text-align:center; padding:30px 0;">
            <div id="resPct" style="font-size:56px; font-weight:700; color:var(--accent);">0%</div>
            <div id="resScore" style="color:var(--text2);"></div>
        </div>
        <button class="action-btn" onclick="showHome()">홈으로</button>
    </div>

    <!-- MANAGE -->
    <div id="manageScreen" class="screen">
        <div class="topbar">
            <button class="back-btn" onclick="showHome()">←</button>
            <h2>단어 관리</h2>
            <button class="sync-action" onclick="addWeekModal()">+ 주차</button>
        </div>
        <div class="week-scroll" id="manageTabs"></div>
        <div class="add-card">
            <input id="inEn" placeholder="English Word" onkeydown="if(event.key==='Enter')document.getElementById('inKo').focus()">
            <input id="inKo" placeholder="뜻 (쉼표로 구분)" onkeydown="if(event.key==='Enter')addWord()">
            <button class="action-btn" onclick="addWord()" style="width:100%; margin:0;">추가하기</button>
        </div>
        <div id="wordListEl"></div>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:10px;">Google 동기화</h2>
            <p style="font-size:14px; color:var(--text2); margin-bottom:20px;">단어장을 안전하게 클라우드에 백업합니다.</p>
            <button class="google-btn" onclick="startGoogleAuth()">Google로 로그인</button>
            <button onclick="closeAuthModal()" style="width:100%; margin-top:10px; background:none; border:none; color:var(--text3); cursor:pointer;">나중에</button>
        </div>
    </div>
</div>

<script>
/* ───── CONFIG & STATE ───── */
const CLIENT_ID = '662327660376-ipf335iurhi0hmnfnphh47tiv0m2vhcc.apps.googleusercontent.com';
const DRAFT_SUBJECT = '[VocabApp-Backup-v1]';

let allWeeks = JSON.parse(localStorage.getItem('vocabWeeks') || '{}');
let wrongWords = JSON.parse(localStorage.getItem('vocabWrong') || '[]');
let currentWeek = localStorage.getItem('currentWeek') || Object.keys(allWeeks)[0] || '';
let gToken = localStorage.getItem('gToken') || '';
let currentWords = [], idx = 0, score = 0, modeType = '', isTest = false;
let selectedVoice = localStorage.getItem('prefVoice') || 'female';

/* ───── UTILS ───── */
const persist = () => {
    localStorage.setItem('vocabWeeks', JSON.stringify(allWeeks));
    localStorage.setItem('vocabWrong', JSON.stringify(wrongWords));
    localStorage.setItem('currentWeek', currentWeek);
};

const showScreen = id => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
};

const showHome = () => { renderHome(); showScreen('homeScreen'); };
const goManage = () => { renderManage(); showScreen('manageScreen'); };
const confirmExit = () => { if(confirm('종료할까요?')) showHome(); };

/* ───── TTS & SOUND ───── */
function speak(t) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'en-US'; u.rate = 0.9;
    const voices = speechSynthesis.getVoices();
    u.voice = voices.find(v => v.name.includes(selectedVoice === 'female' ? 'Google US English' : 'Google UK English Male')) || voices[0];
    speechSynthesis.speak(u);
}
function setVoice(v) { selectedVoice = v; localStorage.setItem('prefVoice', v); renderHome(); }

/* ───── HOME & MANAGE ───── */
function renderHome() {
    const ww = currentWeek ? (allWeeks[currentWeek] || []) : [];
    document.getElementById('wordLabel').textContent = `현재 ${ww.length}개 단어`;
    document.getElementById('wrongLabel').textContent = `${wrongWords.length}개 복습 대기`;
    document.getElementById('homeSub').textContent = currentWeek ? `${currentWeek} 학습 중` : '주차를 선택하세요';
    renderTabs('weekTabs');
    updateSyncUI();
}

function renderTabs(id) {
    const el = document.getElementById(id); el.innerHTML = '';
    Object.keys(allWeeks).forEach(w => {
        const b = document.createElement('button');
        b.className = 'week-chip' + (w === currentWeek ? ' active' : '');
        b.textContent = w;
        b.onclick = () => { currentWeek = w; persist(); renderHome(); if(id==='manageTabs') renderManage(); };
        el.appendChild(b);
    });
}

function addWeekModal() {
    const n = prompt('새 주차 이름:');
    if(!n) return;
    allWeeks[n] = []; currentWeek = n; persist(); renderManage();
}

function renderManage() {
    renderTabs('manageTabs');
    const words = allWeeks[currentWeek] || [];
    const el = document.getElementById('wordListEl');
    el.innerHTML = words.map((w, i) => `
        <div class="word-row">
            <span class="w-en">${w.en}</span>
            <span class="w-ko">${w.ko}</span>
            <button onclick="deleteWord(${i})" style="border:none; background:none; color:var(--red);">✕</button>
        </div>`).join('');
}

function addWord() {
    const en = document.getElementById('inEn').value.trim();
    const ko = document.getElementById('inKo').value.trim();
    if(!en || !ko) return;
    allWeeks[currentWeek].push({en, ko});
    document.getElementById('inEn').value = ''; document.getElementById('inKo').value = '';
    persist(); renderManage(); scheduleSyncSave();
}

function deleteWord(i) {
    allWeeks[currentWeek].splice(i,1); persist(); renderManage(); scheduleSyncSave();
}

/* ───── GAME LOGIC ───── */
function startMode(m) {
    if(!currentWeek || !allWeeks[currentWeek]?.length) return alert('단어가 없습니다.');
    modeType = m; isTest = false; currentWords = [...allWeeks[currentWeek]].sort(() => Math.random() - 0.5);
    idx = 0; score = 0; showScreen('gameScreen'); renderQ();
}
function startTest() { modeType = 'mix'; isTest = true; startMode('mix'); }
function startReview() {
    if(!wrongWords.length) return alert('틀린 단어가 없습니다.');
    modeType = 'super'; isTest = false; currentWords = [...wrongWords];
    idx = 0; score = 0; showScreen('gameScreen'); renderQ();
}

function renderQ() {
    const w = currentWords[idx];
    document.getElementById('gameBar').style.width = ((idx+1)/currentWords.length*100) + '%';
    document.getElementById('gameCounter').textContent = `${idx+1}/${currentWords.length}`;
    const area = document.getElementById('gameArea'); area.innerHTML = '';
    
    const curMode = modeType === 'mix' ? (Math.random() > 0.5 ? 'super' : 'quiz') : modeType;
    
    if(curMode === 'super') {
        const isEn = Math.random() > 0.5;
        area.innerHTML = `
            <div class="card-box">
                <div style="font-size:12px; color:var(--text3); margin-bottom:8px;">${isEn?'뜻을 입력하세요':'영단어를 입력하세요'}</div>
                <div class="card-word">${isEn?w.en:w.ko}</div>
            </div>
            <input class="blank-input" id="si" placeholder="정답 입력" onkeyup="if(event.key==='Enter')checkSuper('${isEn?'en':'ko'}')">
            <button class="action-btn" onclick="checkSuper('${isEn?'en':'ko'}')">정답 확인</button>`;
        if(isEn) speak(w.en);
        setTimeout(() => document.getElementById('si').focus(), 300);
    } else {
        const opts = [w.ko, ...([...allWeeks[currentWeek]].filter(x=>x.ko!==w.ko).map(x=>x.ko).sort(()=>Math.random()-0.5).slice(0,3))].sort(()=>Math.random()-0.5);
        area.innerHTML = `<div class="card-box"><div class="card-word">${w.en}</div></div><div id="qOpts"></div>`;
        opts.forEach(o => {
            const b = document.createElement('div'); b.className = 'qopt'; b.textContent = o;
            b.onclick = () => {
                if(o === w.ko) { b.classList.add('correct'); score++; nextQ(); }
                else { b.classList.add('wrong'); if(!wrongWords.find(x=>x.en===w.en)) wrongWords.push(w); nextQ(); }
            };
            document.getElementById('qOpts').appendChild(b);
        });
        speak(w.en);
    }
}

function checkSuper(type) {
    const val = document.getElementById('si').value.trim().toLowerCase();
    const w = currentWords[idx];
    const ok = type==='en' ? w.ko.toLowerCase().includes(val) : w.en.toLowerCase() === val;
    if(ok) { document.getElementById('si').classList.add('correct'); score++; }
    else { document.getElementById('si').classList.add('wrong'); if(!wrongWords.find(x=>x.en===w.en)) wrongWords.push(w); }
    setTimeout(nextQ, 800);
}

function nextQ() {
    idx++; persist();
    if(idx < currentWords.length) renderQ();
    else if(isTest) showResult();
    else showHome();
}

function showResult() {
    showScreen('resultScreen');
    const pct = Math.round(score/currentWords.length*100);
    document.getElementById('resPct').textContent = pct + '%';
    document.getElementById('resScore').textContent = `${currentWords.length}문제 중 ${score}개 정답`;
}

/* ───── SYNC LOGIC (Gmail) ───── */
let tokenClient;
function initGoogleAuth() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/gmail.modify',
        callback: (resp) => {
            if(resp.access_token) {
                gToken = resp.access_token; localStorage.setItem('gToken', gToken);
                closeAuthModal(); pullFromGmail();
            }
        }
    });
}

const handleSyncAction = () => { if(!gToken) document.getElementById('authModal').style.display='flex'; else pushToGmail(); };
const closeAuthModal = () => document.getElementById('authModal').style.display='none';
const startGoogleAuth = () => tokenClient.requestAccessToken();

function updateSyncUI(state = 'ok') {
    const dot = document.getElementById('syncDot');
    dot.className = 'sync-dot ' + (gToken ? 'ok' : '');
    document.getElementById('syncLabel').textContent = gToken ? '동기화 활성화됨' : '로그인 필요';
}

let syncTimer;
function scheduleSyncSave() { if(gToken) { clearTimeout(syncTimer); syncTimer = setTimeout(pushToGmail, 2000); } }

async function pushToGmail() {
    if (!gToken) return;
    const dot = document.getElementById('syncDot');
    dot.className = 'sync-dot loading'; // 로딩 상태 표시

    try {
        const syncData = {
            weeks: allWeeks,
            wrong: wrongWords,
            ts: Date.now()
        };

        const toBase64 = (str) => btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
        const encodedData = JSON.stringify(syncData);
        const b64Data = toBase64(encodedData);

        const emailContent = [
            `Subject: ${DRAFT_SUBJECT}`,
            `MIME-Version: 1.0`,
            `Content-Type: text/plain; charset="UTF-8"`,
            ``,
            `${b64Data}`
        ].join('\r\n');

        const raw = btoa(unescape(encodeURIComponent(emailContent)))
            .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

        // 1. 기존 백업 삭제
        const search = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/drafts?q=subject:${encodeURIComponent(DRAFT_SUBJECT)}`, {
            headers: { Authorization: `Bearer ${gToken}` }
        }).then(r => r.json());

        if (search.drafts) {
            for (const d of search.drafts) {
                await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/drafts/${d.id}`, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${gToken}` }
                });
            }
        }

        // 2. 새 백업 생성
        const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/drafts', {
            method: 'POST',
            headers: {
                Authorization: `Bearer ${gToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message: { raw } })
        });

        if (!res.ok) throw new Error('저장 실패');

        localStorage.setItem('lastSync', new Date().toISOString());
        localStorage.setItem('lastSyncTs', syncData.ts);
        updateSyncUI(); // 성공 시 UI 갱신
    } catch (e) {
        console.error('동기화 오류:', e);
        dot.className = 'sync-dot error';
        document.getElementById('syncLabel').textContent = '동기화 오류 발생';
    }
}

async function pullFromGmail() {
    try {
        const search = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/drafts?q=subject:${encodeURIComponent(DRAFT_SUBJECT)}`, {
            headers: { Authorization: `Bearer ${gToken}` }
        }).then(r => r.json());
        
        if(!search.drafts) return;
        const draft = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/drafts/${search.drafts[0].id}`, {
            headers: { Authorization: `Bearer ${gToken}` }
        }).then(r => r.json());
        
        const b64 = draft.message.payload.body.data || draft.message.payload.parts[0].body.data;
        const decodedEmail = decodeURIComponent(escape(atob(b64.replace(/-/g, '+').replace(/_/g, '/'))));
        const lastLine = decodedEmail.split('\r\n').pop();
        const data = JSON.parse(decodeURIComponent(escape(atob(lastLine))));
        
        if(data.ts > (parseInt(localStorage.getItem('lastSyncTs') || 0))) {
            allWeeks = data.weeks; wrongWords = data.wrong;
            localStorage.setItem('lastSyncTs', data.ts); persist(); renderHome();
        }
    } catch(e) { console.error(e); }
}

/* ───── INIT ───── */
window.onload = () => {
    if(!Object.keys(allWeeks).length) {
        allWeeks['1주차'] = [{en:'ambitious', ko:'야망 있는'}, {en:'perseverance', ko:'인내'}];
        currentWeek = '1주차'; persist();
    }
    renderHome();
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = initGoogleAuth;
    document.head.appendChild(s);
    if(gToken) pullFromGmail();
};
</script>
