<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>단어장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F2EE;
  --surface: #FFFFFF;
  --surface2: #EFEDE8;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --text: #1C1B18;
  --text2: #6B6860;
  --text3: #A8A69F;
  --accent: #4338CA;
  --accent-bg: #EEF2F6;
  --accent-mid: #6366F1;
  --green: #166534;
  --green-bg: #DCFCE7;
  --red: #991B1B;
  --red-bg: #FEE2E2;
  --yellow-bg: #FEF9C3;
  --yellow: #854D0E;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --font: 'DM Sans', 'Noto Sans KR', sans-serif;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

#app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

.screen { display: none; animation: fadeUp 0.22s ease; }
.screen.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.pad { padding: 0 18px; }
.gap { height: 10px; }

.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 18px 4px;
  padding-top: calc(env(safe-area-inset-top, 0px) + 16px);
}
.topbar h2 { font-size: 17px; font-weight: 700; flex: 1; }
.back-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2); font-size: 16px;
}

.home-header {
  padding: 20px 18px 12px;
  padding-top: calc(env(safe-area-inset-top, 0px) + 20px);
}
.home-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.home-header p { font-size: 13px; color: var(--text2); margin-top: 2px; }

.voice-row { display: flex; gap: 6px; padding: 0 18px 16px; }
.voice-btn {
  flex: 1; padding: 9px;
  border-radius: var(--radius-xs); border: 1px solid var(--border2);
  background: var(--surface); font-size: 12px; font-weight: 700;
  font-family: var(--font); cursor: pointer; color: var(--text2);
  transition: all 0.12s;
}
.voice-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 18px;
}
.mc {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px 14px 14px;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
  position: relative; overflow: hidden;
}
.mc:active { transform: scale(0.97); }
.mc-full { grid-column: span 2; }
.mc-hl { background: var(--accent); border-color: var(--accent); color: #fff; }
.mc-hl .mc-desc { color: rgba(255,255,255,0.65); }
.mc-icon { font-size: 22px; margin-bottom: 8px; }
.mc-label { font-size: 14px; font-weight: 700; }
.mc-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }

.prog-track {
  height: 4px; background: var(--surface2);
  border-radius: 99px; overflow: hidden;
  margin: 0 18px 20px;
}
.prog-fill {
  height: 4px; background: var(--accent-mid);
  width: 0%; transition: width 0.3s ease;
}

.card-box {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 34px 24px;
  margin: 0 18px 16px;
  text-align: center;
}
.card-hint { font-size: 12px; color: var(--text3); margin-bottom: 8px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.card-word {
  font-size: 26px; font-weight: 700; color: var(--accent);
  letter-spacing: -0.5px; line-height: 1.4;
}
.tts-btn {
  background: none; border: none; cursor: pointer;
  font-size: 20px; margin-left: 6px; vertical-align: middle;
  padding: 4px; border-radius: 50%;
}

.blank-input {
  width: calc(100% - 36px); margin: 0 18px 10px;
  padding: 15px 18px;
  border: 2px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 18px; font-weight: 700; font-family: var(--font);
  text-align: center; outline: none; background: var(--surface);
  color: var(--text);
  transition: border-color 0.2s, background 0.2s;
}
.blank-input.correct { border-color: #16A34A; background: var(--green-bg); }
.blank-input.wrong { border-color: #DC2626; background: var(--red-bg); }

.quiz-opts { padding: 0 18px; }
.qopt {
  padding: 15px 18px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); margin-bottom: 8px;
  cursor: pointer; font-size: 15px; font-weight: 500;
  font-family: var(--font);
  transition: all 0.12s;
}
.qopt:active { transform: scale(0.99); }
.qopt.correct { background: var(--green-bg); color: var(--green); border-color: #86EFAC; }
.qopt.wrong { background: var(--red-bg); color: var(--red); border-color: #FCA5A5; }
.qopt.reveal { background: var(--yellow-bg); color: var(--yellow); border-color: #FDE047; }

.action-btn {
  display: block; width: calc(100% - 36px); margin: 0 18px;
  padding: 15px; background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 700; font-family: var(--font);
  cursor: pointer; transition: opacity 0.15s;
}
.action-btn:active { opacity: 0.85; }
.feedback-row {
  min-height: 28px; text-align: center; font-size: 13px;
  color: var(--text3); margin: 0 18px 8px;
}

.result-hero { text-align: center; padding: 30px 18px 20px; }
.result-pct { font-size: 56px; font-weight: 700; color: var(--accent); letter-spacing: -2px; }
.result-sub { font-size: 16px; color: var(--text2); margin-top: 4px; }
.result-table { width: calc(100% - 36px); margin: 0 18px; border-collapse: collapse; font-size: 14px; }
.result-table td { padding: 11px 10px; border-bottom: 1px solid var(--border); }
.result-table .ok { color: var(--green); font-weight: 700; }
.result-table .ng { color: var(--red); font-weight: 700; }

.word-list-header {
  padding: 16px 18px 8px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--text3);
}
.word-row {
  display: flex; align-items: center;
  padding: 11px 18px; border-bottom: 1px solid var(--border); gap: 10px;
}
.word-row:last-child { border-bottom: none; }
.w-en { font-size: 14px; font-weight: 700; flex: 1; }
.w-ko { font-size: 13px; color: var(--text2); flex: 1.2; }
.list-card {
  margin: 0 18px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}

.answer-box {
  display: none; margin: 0 18px 10px;
  padding: 14px; background: var(--yellow-bg);
  border-radius: var(--radius-sm); text-align: center;
  border: 1px solid #FDE047;
}
.answer-box h3 { font-size: 20px; font-weight: 700; color: var(--yellow); }
</style>
</head>
<body>
<div id="app">

<div id="homeScreen" class="screen active">
  <div class="home-header">
    <h1>교재 필수 단어장 ✦</h1>
    <p id="homeSub">총 36개 어휘 배치 완료</p>
  </div>

  <div class="voice-row">
    <button class="voice-btn active" id="vf" onclick="setVoice('female')">👩 여성 음성</button>
    <button class="voice-btn" id="vm" onclick="setVoice('male')">👨 남성 음성</button>
  </div>

  <div class="menu-grid">
    <div class="mc mc-hl" onclick="startMode('super_en_ko')">
      <div class="mc-icon">🚀</div>
      <div class="mc-label">주관식 (영➔한)</div>
      <div class="mc-desc">뜻 직접 입력 (둘 다 허용)</div>
    </div>
    <div class="mc mc-hl" onclick="startMode('super_ko_en')">
      <div class="mc-icon">✍️</div>
      <div class="mc-label">주관식 (한➔영)</div>
      <div class="mc-desc">스펠링 직접 타이핑</div>
    </div>
    <div class="mc" style="background:var(--accent-bg); border-color:#C7D2FE" onclick="startMode('quiz_en_ko')">
      <div class="mc-icon">✅</div>
      <div class="mc-label">객관식 (영➔한)</div>
      <div class="mc-desc">단어 보고 맞는 뜻 고르기</div>
    </div>
    <div class="mc" style="background:var(--accent-bg); border-color:#C7D2FE" onclick="startMode('quiz_ko_en')">
      <div class="mc-icon">🔤</div>
      <div class="mc-label">객관식 (한➔영)</div>
      <div class="mc-desc">뜻 보고 맞는 단어 고르기</div>
    </div>
    <div class="mc mc-full" onclick="goManage()">
      <div class="mc-icon">📝</div>
      <div class="mc-label">전체 단어 목록 보기</div>
      <div class="mc-desc">이번 단원 36단어 전체 구성 확인</div>
    </div>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="confirmExit()">←</button>
    <h2 id="gameTitle">학습 중</h2>
    <span id="gameCounter" style="font-size:12px; color:var(--text3); font-weight:700"></span>
  </div>
  <div class="prog-track"><div id="gameBar" class="prog-fill"></div></div>
  <div id="gameArea"></div>
</div>

<div id="resultScreen" class="screen">
  <div class="topbar"><h2>결과</h2></div>
  <div class="result-hero">
    <div class="result-pct" id="resPct">0%</div>
    <div class="result-sub" id="resScore"></div>
  </div>
  <div class="list-card" style="margin-bottom: 20px; max-height: 300px; overflow-y: auto;">
    <table class="result-table" id="reportTable"></table>
  </div>
  <button class="action-btn" onclick="showHome()">홈으로</button>
  <div style="height:32px"></div>
</div>

<div id="manageScreen" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showHome()">←</button>
    <h2>단어 목록</h2>
  </div>
  <div class="word-list-header">교재 단어 리스트 (36개)</div>
  <div class="list-card" style="max-height: 70vh; overflow-y: auto;">
    <div id="wordListEl"></div>
  </div>
  <div style="height:40px"></div>
</div>

</div>

<script>
/* ════ 신규 교재 사진 4장 속 단어 36개 데이터 ════ */
const currentWordsConst = [
  { en: 'neuroscientist', ko: '신경 과학자, 뇌과학자' },
  { en: 'crucial', ko: '중대한, 아주 중요한' },
  { en: 'inability', ko: '무능, 할 수 없음' },
  { en: 'rational', ko: '합리적인, 이성적인' },
  { en: 'convey', ko: '나르다, 전달하다' },
  { en: 'obvious', ko: '분명한, 명백한' },
  { en: 'violate', ko: '위반하다, 침해하다' },
  { en: 'assume', ko: '추정하다, 추측하다' },
  { en: 'victoriously', ko: '승리하여, 당당하게' },
  { en: 'ultimately', ko: '궁극적으로, 결국' },
  { en: 'achieve', ko: '달성하다, 성취하다' },
  { en: 'disappear', ko: '사라지다' },
  { en: 'appealing', ko: '매력적인, 흥미를 끄는' },
  { en: 'pave', ko: '포장하다, 덮다' },
  { en: 'valuable', ko: '가치 있는, 귀중한' },
  { en: 'anticipate', ko: '예상하다, 기대하다' },
  { en: 'arise', ko: '생기다, 발생하다' },
  { en: 'debt', ko: '빚, 부채' },
  { en: 'shortcoming', ko: '결점, 단점' },
  { en: 'necessity', ko: '필수품' },
  { en: 'reveal', ko: '드러내다' },
  { en: 'venture', ko: '위험을 무릅쓰고 가다, 모험하다' },
  { en: 'exploration', ko: '탐사' },
  { en: 'territory', ko: '영토, 지역' },
  { en: 'inadequate', ko: '불충분한, 부적절한' },
  { en: 'intellectual', ko: '지식인, 지적인' },
  { en: 'inquire', ko: '묻다' },
  { en: 'satisfactory', ko: '만족스러운' },
  { en: 'moral', ko: '도덕적인' },
  { en: 'valid', ko: '유효한' },
  { en: 'notion', ko: '개념, 관념' },
  { en: 'deep-learning', ko: '딥 러닝, 심층 학습' },
  { en: 'limitations', ko: '한계, 제한' },
  { en: 'instance', ko: '사례, 경우' },
  { en: 'counteract', ko: '대응하다, 거스르다' },
  { en: 'level', ko: '평평한, 수평의' },
  { en: 'friction', ko: '마찰, 마찰력' }
];

let currentWords = [], idx = 0, score = 0;
let lock = false, modeType = '', reports = [], qSide = 'en';
let selectedVoice = localStorage.getItem('prefVoice') || 'female';

/* ════ AUDIO ════ */
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(ok) {
  if (AC.state === 'suspended') AC.resume();
  const now = AC.currentTime;
  if (ok) {
    [523.25, 659.25, 783.99].forEach((f, i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.frequency.setValueAtTime(f, now + i*0.1);
      g.gain.setValueAtTime(0, now+i*0.1);
      g.gain.linearRampToValueAtTime(0.08, now+i*0.1+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now+i*0.1+0.12);
      o.connect(g); g.connect(AC.destination);
      o.start(now+i*0.1); o.stop(now+i*0.1+0.12);
    });
  } else {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(200, now);
    g.gain.setValueAtTime(0.08, now);
    g.gain.linearRampToValueAtTime(0.001, now+0.45);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(now+0.45);
  }
}

/* ════ TTS ════ */
function speak(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.88; u.pitch = 1.1;
  const vv = speechSynthesis.getVoices();
  const pick = selectedVoice === 'female'
    ? vv.find(v => v.lang.startsWith('en') && (v.name.includes('Samantha') || (v.name.includes('Google') && !v.name.toLowerCase().includes('male'))))
    : vv.find(v => v.lang.startsWith('en') && (v.name.includes('Daniel') || v.name.toLowerCase().includes('male')));
  if (pick) u.voice = pick;
  speechSynthesis.speak(u);
}

function setVoice(t) {
  selectedVoice = t; localStorage.setItem('prefVoice', t);
  document.getElementById('vf').classList.toggle('active', t==='female');
  document.getElementById('vm').classList.toggle('active', t==='male');
}

/* ════ SCREEN NAV ════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function showHome() { showScreen('homeScreen'); }
function goManage() { renderWordList(); showScreen('manageScreen'); }
function confirmExit() { if (confirm('학습을 종료할까요?')) showHome(); }

function renderWordList() {
  const el = document.getElementById('wordListEl');
  el.innerHTML = currentWordsConst.map((w, i) =>
    `<div class="word-row">
      <span class="w-en">${w.en}</span>
      <span class="w-ko">${w.ko}</span>
    </div>`
  ).join('');
}

/* ════ GAME ENGINE ════ */
function startMode(mode) {
  modeType = mode;
  currentWords = shuffle([...currentWordsConst]);
  idx = 0; score = 0; reports = []; lock = false;
  showScreen('gameScreen'); renderQ();
}
function shuffle(a) {
  for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function renderQ() {
  lock = false;
  const w = currentWords[idx];
  document.getElementById('gameBar').style.width = ((idx+1)/currentWords.length*100)+'%';
  
  // 모드별 타이틀 매칭
  const titleMap = {
    super_en_ko: '주관식 (영➔한)',
    super_ko_en: '주관식 (한➔영)',
    quiz_en_ko: '객관식 (영➔한)',
    quiz_ko_en: '객관식 (한➔영)'
  };
  document.getElementById('gameTitle').textContent = titleMap[modeType] || '학습';
  document.getElementById('gameCounter').textContent = `${idx+1} / ${currentWords.length}`;
  const area = document.getElementById('gameArea');
  area.innerHTML = '';

  // 1) 주관식 (영어 ➔ 한국어)
  if (modeType === 'super_en_ko') {
    qSide = 'en';
    area.innerHTML = `
      <div class="card-box">
        <div class="card-hint">한국어 뜻을 입력하세요</div>
        <div class="card-word">${w.en} <button class="tts-btn" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button></div>
      </div>
      <div class="feedback-row" id="fb"></div>
      <input class="blank-input" id="si" type="text" placeholder="정답 입력" autocomplete="off" spellcheck="false" onkeyup="if(event.key==='Enter')checkSuper()">
      <button class="action-btn" id="checkBtn" onclick="checkSuper()">정답 확인</button>
      <div class="answer-box" id="ansBox">
        <div style="font-size:12px;color:var(--yellow);font-weight:700;margin-bottom:4px">정답</div>
        <h3>${w.ko}</h3>
        <button class="action-btn" style="margin-top:12px;background:var(--green);padding:11px" onclick="moveNext()">다음 →</button>
      </div>`;
    setTimeout(() => document.getElementById('si')?.focus(), 200);
    speak(w.en);
  }
  // 2) 주관식 (한국어 ➔ 영어)
  else if (modeType === 'super_ko_en') {
    qSide = 'ko';
    area.innerHTML = `
      <div class="card-box">
        <div class="card-hint">영어 단어를 입력하세요</div>
        <div class="card-word" style="font-size:22px; font-weight:500;">${w.ko}</div>
      </div>
      <div class="feedback-row" id="fb"></div>
      <input class="blank-input" id="si" type="text" placeholder="정답 입력" autocomplete="off" spellcheck="false" onkeyup="if(event.key==='Enter')checkSuper()">
      <button class="action-btn" id="checkBtn" onclick="checkSuper()">정답 확인</button>
      <div class="answer-box" id="ansBox">
        <div style="font-size:12px;color:var(--yellow);font-weight:700;margin-bottom:4px">정답</div>
        <h3>${w.en}</h3>
        <button class="action-btn" style="margin-top:12px;background:var(--green);padding:11px" onclick="moveNext()">다음 →</button>
      </div>`;
    setTimeout(() => document.getElementById('si')?.focus(), 200);
  }
  // 3) 객관식 (영어 ➔ 한국어)
  else if (modeType === 'quiz_en_ko') {
    const pool = currentWordsConst;
    const distractors = shuffle(pool.filter(x=>x.en!==w.en)).slice(0,3).map(x=>x.ko);
    const opts = shuffle([...new Set([w.ko, ...distractors])]);
    area.innerHTML = `
      <div class="card-box">
        <div class="card-hint">올바른 뜻을 고르세요</div>
        <div class="card-word">${w.en} <button class="tts-btn" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button></div>
      </div>
      <div class="quiz-opts" id="qOpts"></div>`;
    const el = document.getElementById('qOpts');
    opts.forEach(o => {
      const b = document.createElement('div');
      b.className = 'qopt'; b.textContent = o;
      if (o===w.ko) b.id = 'correctOpt';
      b.onclick = () => {
        if (lock) return; lock = true;
        const ok = o===w.ko;
        b.classList.add(ok?'correct':'wrong');
        if (!ok) document.getElementById('correctOpt')?.classList.add('reveal');
        playBeep(ok); handleAns(ok, o);
      };
      el.appendChild(b);
    });
    speak(w.en);
  }
  // 4) 객관식 (한국어 ➔ 영어)
  else if (modeType === 'quiz_ko_en') {
    const pool = currentWordsConst;
    const distractors = shuffle(pool.filter(x=>x.en!==w.en)).slice(0,3).map(x=>x.en);
    const opts = shuffle([...new Set([w.en, ...distractors])]);
    area.innerHTML = `
      <div class="card-box">
        <div class="card-hint">올바른 단어를 고르세요</div>
        <div class="card-word" style="font-size:22px; font-weight:500;">${w.ko}</div>
      </div>
      <div class="quiz-opts" id="qOpts"></div>`;
    const el = document.getElementById('qOpts');
    opts.forEach(o => {
      const b = document.createElement('div');
      b.className = 'qopt'; b.textContent = o;
      if (o===w.en) b.id = 'correctOpt';
      b.onclick = () => {
        if (lock) return; lock = true;
        const ok = o===w.en;
        b.classList.add(ok?'correct':'wrong');
        if (!ok) document.getElementById('correctOpt')?.classList.add('reveal');
        playBeep(ok); if(ok) speak(w.en); handleAns(ok, o);
      };
      el.appendChild(b);
    });
  }
}

function checkSuper() {
  if (lock) return;
  const inp = document.getElementById('si');
  const val = inp.value.trim().toLowerCase();
  const w = currentWords[idx];
  
  let ok = false;
  if (qSide === 'en') {
    const correctMeanings = w.ko.split(/[\/,]/).map(s => s.trim().toLowerCase());
    ok = correctMeanings.some(a => val === a || val.includes(a) || a.includes(val));
  } else {
    ok = (val === w.en.toLowerCase());
  }

  if (ok) {
    lock = true; inp.classList.add('correct'); playBeep(true);
    if (qSide==='ko') speak(w.en);
    handleAns(true, val);
  } else {
    inp.classList.add('wrong'); playBeep(false);
    setTimeout(() => {
      inp.classList.remove('wrong'); inp.value = ''; inp.focus();
      document.getElementById('fb').innerHTML =
        `<button onclick="showHint()" style="color:var(--text3);font-size:12px;background:none;border:none;cursor:pointer;text-decoration:underline">정답 보기</button>`;
    }, 1100);
  }
}
function showHint() {
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('si').disabled = true;
  const ab = document.getElementById('ansBox'); if (ab) ab.style.display='block';
  speak(currentWords[idx].en);
}
function handleAns(ok, userAns='') {
  const w = currentWords[idx];
  if (ok) { score++; }
  reports.push({ en: w.en, ko: w.ko, ok });
  setTimeout(moveNext, ok ? 750 : 1800);
}
function moveNext() {
  idx++;
  if (idx < currentWords.length) { renderQ(); }
  else { showResult(); }
}
function showResult() {
  showScreen('resultScreen');
  const pct = Math.round(score/currentWords.length*100);
  document.getElementById('resPct').textContent = pct+'%';
  document.getElementById('resScore').textContent = `${score} / ${currentWords.length} 정답`;
  document.getElementById('reportTable').innerHTML = reports.map(r =>
    `<tr><td>${r.en}</td><td style="color:var(--text2);font-size:12px">${r.ko}</td><td class="${r.ok?'ok':'ng'}">${r.ok?'○':'×'}</td></tr>`
  ).join('');
}
</script>
