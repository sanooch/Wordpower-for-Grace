<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>단어장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F2EE;
  --surface: #FFFFFF;
  --surface2: #EFEDE8;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --text: #1C1B18;
  --text2: #6B6860;
  --text3: #A8A69F;
  --accent: #4338CA;
  --accent-bg: #EEF2F6;
  --accent-mid: #6366F1;
  --green: #166534;
  --green-bg: #DCFCE7;
  --red: #991B1B;
  --red-bg: #FEE2E2;
  --yellow-bg: #FEF9C3;
  --yellow: #854D0E;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --font: 'DM Sans', 'Noto Sans KR', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

#app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

.screen { display: none; animation: fadeUp 0.22s ease; }
.screen.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 18px 4px;
  padding-top: calc(env(safe-area-inset-top, 0px) + 16px);
}
.topbar h2 { font-size: 17px; font-weight: 700; flex: 1; }
.back-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2); font-size: 16px;
}

.home-header {
  padding: 20px 18px 12px;
  padding-top: calc(env(safe-area-inset-top, 0px) + 20px);
}
.home-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.home-header p { font-size: 13px; color: var(--text2); margin-top: 2px; }

.tab-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 0 18px 14px;
  scrollbar-width: none;
}
.tab-row::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0; padding: 8px 14px; text-align: center;
  font-size: 13px; font-weight: 700; color: var(--text2);
  background: var(--surface); border: 1px solid var(--border2); border-radius: 99px;
  cursor: pointer; transition: all 0.15s;
}
.tab-btn.active {
  background: var(--accent);
  color: #ffffff;
  border-color: var(--accent);
}

.voice-row { display: flex; gap: 6px; padding: 0 18px 16px; }
.voice-btn {
  flex: 1; padding: 9px;
  border-radius: var(--radius-xs); border: 1px solid var(--border2);
  background: var(--surface); font-size: 12px; font-weight: 700;
  font-family: var(--font); cursor: pointer; color: var(--text2);
}
.voice-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 18px;
}
.mc {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 16px 14px 14px;
  cursor: pointer;
  transition: transform 0.12s;
}
.mc:active { transform: scale(0.97); }
.mc-full { grid-column: span 2; }
.mc-hl { background: var(--accent); border-color: var(--accent); color: #fff; }
.mc-hl .mc-desc { color: rgba(255,255,255,0.65); }
.mc-icon { font-size: 22px; margin-bottom: 8px; }
.mc-label { font-size: 14px; font-weight: 700; }
.mc-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }

.prog-track { height: 4px; background: var(--surface2); border-radius: 99px; margin: 0 18px 20px; overflow: hidden; }
.prog-fill { height: 4px; background: var(--accent-mid); width: 0%; transition: width 0.3s ease; }

.card-box {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 34px 24px; margin: 0 18px 16px; text-align: center;
}
.card-hint { font-size: 12px; color: var(--text3); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
.card-word { font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1.4; }
.tts-btn { background: none; border: none; cursor: pointer; font-size: 20px; margin-left: 6px; vertical-align: middle; }

/* 🌟 주관식 입력창 효과 및 깜빡임 애니메이션 */
.blank-input {
  width: calc(100% - 36px); margin: 0 18px 10px; padding: 15px 18px;
  border: 2px solid var(--border2); border-radius: var(--radius-sm);
  font-size: 18px; font-weight: 700; font-family: var(--font); text-align: center; outline: none; background: var(--surface);
}
.blank-input.correct { 
  border-color: #16A34A; 
  background: var(--green-bg);
  animation: blinkCorrectBlock 0.25s linear 2;
}
.blank-input.wrong { 
  border-color: #DC2626; 
  background: var(--red-bg);
  animation: blinkWrongBlock 0.25s linear 2;
}

/* 🌟 객관식 선택 버튼 효과 및 깜빡임 애니메이션 */
.quiz-opts { padding: 0 18px; }
.qopt {
  padding: 15px 18px; background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; font-size: 15px; font-weight: 500;
}
.qopt.correct { 
  background: var(--green-bg); color: var(--green); border-color: #86EFAC; 
  animation: blinkCorrectBlock 0.25s linear 2;
}
.qopt.wrong { 
  background: var(--red-bg); color: var(--red); border-color: #FCA5A5; 
  animation: blinkWrongBlock 0.25s linear 2;
}
.qopt.reveal { background: var(--yellow-bg); color: var(--yellow); border-color: #FDE047; }

/* 키프레임 정의 */
@keyframes blinkCorrectBlock {
  0%, 100% { background: var(--green-bg); }
  50% { background: #FFFFFF; }
}
@keyframes blinkWrongBlock {
  0%, 100% { background: var(--red-bg); }
  50% { background: #FFFFFF; }
}

.action-btn {
  display: block; width: calc(100% - 36px); margin: 0 18px; padding: 15px; background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer;
}
.feedback-row { min-height: 28px; text-align: center; font-size: 13px; color: var(--text3); margin: 0 18px 8px; }

.result-hero { text-align: center; padding: 30px 18px 20px; }
.result-pct { font-size: 56px; font-weight: 700; color: var(--accent); }
.result-sub { font-size: 16px; color: var(--text2); margin-top: 4px; }
.result-table { width: calc(100% - 36px); margin: 0 18px; border-collapse: collapse; font-size: 14px; }
.result-table td { padding: 11px 10px; border-bottom: 1px solid var(--border); }
.result-table .ok { color: var(--green); font-weight: 700; }
.result-table .ng { color: var(--red); font-weight: 700; }

.word-list-header { padding: 16px 18px 8px; font-size: 12px; font-weight: 700; color: var(--text3); }
.word-row { display: flex; align-items: center; padding: 11px 18px; border-bottom: 1px solid var(--border); gap: 10px; }
.w-en { font-size: 14px; font-weight: 700; flex: 1; }
.w-ko { font-size: 13px; color: var(--text2); flex: 1.2; }
.list-card { margin: 0 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

.answer-box { display: none; margin: 0 18px 10px; padding: 14px; background: var(--yellow-bg); border-radius: var(--radius-sm); text-align: center; border: 1px solid #FDE047; }
.answer-box h3 { font-size: 20px; font-weight: 700; color: var(--yellow); }
</style>
</head>
<body>
<div id="app">

<div id="homeScreen" class="screen active">
  <div class="home-header">
    <h1>교재 필수 단어장 ✦</h1>
    <p id="homeSub">로딩 중...</p>
  </div>

  <div class="tab-row" id="tabContainer"></div>

  <div class="voice-row">
    <button class="voice-btn active" id="vf" onclick="setVoice('female')">👩 여성 음성</button>
    <button class="voice-btn" id="vm" onclick="setVoice('male')">👨 남성 음성</button>
  </div>

  <div class="menu-grid">
    <div class="mc mc-hl" onclick="startMode('super_en_ko')">
      <div class="mc-icon">🚀</div>
      <div class="mc-label">주관식 (영➔한)</div>
      <div class="mc-desc">뜻 직접 입력 (절반 이상 일치)</div>
    </div>
    <div class="mc mc-hl" onclick="startMode('super_ko_en')">
      <div class="mc-icon">✍️</div>
      <div class="mc-label">주관식 (한➔영)</div>
      <div class="mc-desc">스펠링 직접 타이핑 (절반 이상 일치)</div>
    </div>
    <div class="mc" style="background:var(--accent-bg); border-color:#C7D2FE" onclick="startMode('quiz_en_ko')">
      <div class="mc-icon">✅</div>
      <div class="mc-label">객관식 (영➔한)</div>
      <div class="mc-desc">단어 뜻 4지선다 고르기</div>
    </div>
    <div class="mc" style="background:var(--accent-bg); border-color:#C7D2FE" onclick="startMode('quiz_ko_en')">
      <div class="mc-icon">🔤</div>
      <div class="mc-label">객관식 (한➔영)</div>
      <div class="mc-desc">뜻을 보고 알맞은 단어 고르기</div>
    </div>
    <div class="mc mc-full" onclick="goManage()">
      <div class="mc-icon">📝</div>
      <div class="mc-label">현재 탭 단어 목록 보기</div>
      <div class="mc-desc">선택된 단어 리스트 전체 확인</div>
    </div>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="confirmExit()">←</button>
    <h2 id="gameTitle">학습 중</h2>
    <span id="gameCounter" style="font-size:12px; color:var(--text3); font-weight:700"></span>
  </div>
  <div class="prog-track"><div id="gameBar" class="prog-fill"></div></div>
  <div id="gameArea"></div>
</div>

<div id="resultScreen" class="screen">
  <div class="topbar"><h2>결과</h2></div>
  <div class="result-hero">
    <div class="result-pct" id="resPct">0%</div>
    <div class="result-sub" id="resScore"></div>
  </div>
  <div class="list-card" style="margin-bottom: 20px; max-height: 300px; overflow-y: auto;">
    <table class="result-table" id="reportTable"></table>
  </div>
  <button class="action-btn" onclick="showHome()">홈으로</button>
  <div style="height:32px"></div>
</div>

<div id="manageScreen" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showHome()">←</button>
    <h2>단어 목록</h2>
  </div>
  <div class="word-list-header" id="listHeader">단어 리스트</div>
  <div class="list-card" style="max-height: 70vh; overflow-y: auto;">
    <div id="wordListEl"></div>
  </div>
  <div style="height:40px"></div>
</div>

</div>

<script>
const wordData = {
  "Ch.01 (이번주)": [
    { en: 'develop a sense', ko: '의식을 갖게 되다' },
    { en: 'refer to as sth', ko: '~라고 부르다' },
    { en: 'school admissions', ko: '학교 입학' },
    { en: 'preferences', ko: '선호, 특혜' },
    { en: 'financial donation', ko: '재정적 기부' },
    { en: 'in the presence of sth', ko: '~가 있는 상황에서' },
    { en: 'academic records', ko: '학업 기록' },
    { en: 'ripple through', ko: '파급력을 미치다' },
    { en: 'apply for sth', ko: '~에 지원하다' },
    { en: 'cultural background', ko: '문화적 배경' },
    { en: 'fit in', ko: '어울리다, 적응하다' },
    { en: 'underrepresentation', ko: '과소 대표' },
    { en: 'organ transplantation', ko: '장기 이식' },
    { en: 'pair with sth', ko: '~와 짝을 이루다' },
    { en: 'surgical procedure', ko: '수술 절차' },
    { en: 'ongoing challenge', ko: '지속적인 과제' },
    { en: 'artificial organ', ko: '인공 장기' },
    { en: 'firm commitment', ko: '확고한 의지' },
    { en: 'meet the growing need', ko: '증가하는 수요를 충족하다' },
    { en: 'room for improvement', ko: '개선의 여지' },
    { en: 'informed consent', ko: '사전 동의' },
    { en: 'commercialization', ko: '상업화' },
    { en: 'ethical challenge', ko: '윤리적 도전' }
  ],
  "Ch.06 (지난주)": [
    { en: 'prey on sth', ko: '잡아먹다, ~을 잡아먹다' },
    { en: 'increase sales', ko: '매출을 증가시키다' },
    { en: 'risk of sth', ko: '위험, ~의 위험' },
    { en: 'provide incentive to V', ko: '동기를 제공하다, ~할 동기를 제공하다' },
    { en: 'be filled with with sth', ko: '가득 찬, ~로 가득 찬' },
    { en: 'alert A to B', ko: '경고하다, ~에게 ~에 대해 경고하다' },
    { en: 'goods and services', ko: '재화와 서비스' },
    { en: 'nature of work', ko: '일의 성격' },
    { en: 'eating habit', ko: '식습관' },
    { en: 'thrive in sth', ko: '번성하다, ~에서 잘 번성하다' },
    { en: 'correlation fallacy', ko: '상관관계 오류' },
    { en: 'government agency', ko: '정부 기관' },
    { en: 'race to V', ko: '경쟁적으로 움직이다, ~하기 위해 경쟁적으로 움직이다' },
    { en: 'explain one\'s feelings', ko: '자신의 감정을 말로 설명하다' },
    { en: 'steady stream of sth', ko: '안정적인 유입, 안정적인 공급' },
    { en: 'behind the scenes', ko: '이면에서는' },
    { en: 'be charged with fraud', ko: '사기 혐의로 기소되다' },
    { en: 'be divided into sth', ko: '나뉘다, ~으로 나뉘다' },
    { en: 'spinal column', ko: '척추' }
  ],
  "Ch.07~08 (과학)": [
    { en: 'make use of sth', ko: '이용하다, ~을 이용하다' },
    { en: 'get rid of sth', ko: '제거하다, ~을 제거하다' },
    { en: 'interfere with sth', ko: '방해하다, ~을 방해하다' },
    { en: 'rely on sth', ko: '의존하다, ~에 의존하다' },
    { en: 'be related to sth', ko: '관련이 있다, ~와 관련이 있다' },
    { en: 'cope with sth', ko: '대처하다, ~에 대처하다' },
    { en: 'in contrast to sth', ko: '대조적으로, ~와 대조적으로' },
    { en: 'have an impact on sth', ko: '영향을 주다, ~에 영향을 주다' },
    { en: 'take steps', ko: '조치를 취하다' },
    { en: 'be vulnerable to sth', ko: '취약하다, ~에 취약하다' },
    { en: 'be prone to sth', ko: '경향이 있다, ~하기 쉽다' },
    { en: 'wreak havoc on sth', ko: '사정없이 파괴하다, 큰 피해를 입히다' },
    { en: 'flicker on and off', ko: '깜빡거리다, 켜졌다 꺼졌다 하다' },
    { en: 'central nervous system', ko: '중추 신경계' },
    { en: 'immune system', ko: '면역 체계' },
    { en: 'with regard to sth', ko: '관하여, ~에 관하여' },
    { en: 'make a decision', ko: '결정을 내리다' },
    { en: 'be responsible for sth', ko: '책임이 있다, ~에 대해 책임이 있다' }
  ]
};

let currentWeekTab = Object.keys(wordData)[0];
let currentWords = [], idx = 0, score = 0;
let lock = false, modeType = '', reports = [], qSide = 'en';
let selectedVoice = localStorage.getItem('prefVoice') || 'female';

let AC = null;
function initAudio() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC && AC.state === 'suspended') AC.resume();
}

function playBeep(ok) {
  try {
    initAudio(); if (!AC) return;
    const now = AC.currentTime;
    if (ok) {
      const freqs = [392.00, 523.25, 659.25]; 
      freqs.forEach((f, i) => {
        const o = AC.createOscillator(), g = AC.createGain();
        o.frequency.setValueAtTime(f, now + i*0.08);
        g.gain.setValueAtTime(0, now+i*0.08);
        g.gain.linearRampToValueAtTime(0.04, now+i*0.08+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, now+i*0.08+0.15);
        o.connect(g); g.connect(AC.destination);
        o.start(now+i*0.08); o.stop(now+i*0.08+0.15);
      });
    } else {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(180, now);
      g.gain.setValueAtTime(0.04, now);
      g.gain.linearRampToValueAtTime(0.001, now+0.4);
      o.connect(g); g.connect(AC.destination);
      o.start(); o.stop(now+0.4);
    }
  } catch(e){}
}

function speak(text) {
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.0;
    u.onerror = (e) => { console.log("TTS path locked"); };
    const vv = speechSynthesis.getVoices();
    const pick = selectedVoice === 'female'
      ? vv.find(v => v.lang.startsWith('en') && (v.name.includes('Samantha') || (v.name.includes('Google') && !v.name.toLowerCase().includes('male'))))
      : vv.find(v => v.lang.startsWith('en') && (v.name.includes('Daniel') || v.name.toLowerCase().includes('male')));
    if (pick) u.voice = pick;
    window.speechSynthesis.speak(u);
  } catch(e){}
}

function renderTabs() {
  const container = document.getElementById('tabContainer');
  if(!container) return;
  container.innerHTML = '';
  Object.keys(wordData).forEach(key => {
    const btn = document.createElement('button');
    btn.className = `tab-btn ${key === currentWeekTab ? 'active' : ''}`;
    btn.textContent = key;
    btn.onclick = () => {
      initAudio();
      currentWeekTab = key;
      renderTabs();
      updateHomeSubCount();
    };
    container.appendChild(btn);
  });
}

function updateHomeSubCount() {
  const count = wordData[currentWeekTab].length;
  const el = document.getElementById('homeSub');
  if(el) el.textContent = `${currentWeekTab} 단어 수: 총 ${count}개`;
}

function setVoice(t) {
  selectedVoice = t; localStorage.setItem('prefVoice', t);
  document.getElementById('vf').classList.toggle('active', t==='female');
  document.getElementById('vm').classList.toggle('active', t==='male');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function showHome() { showScreen('homeScreen'); updateHomeSubCount(); }
function goManage() { renderWordList(); showScreen('manageScreen'); }
function confirmExit() { if (confirm('학습을 종료할까요?')) showHome(); }

function renderWordList() {
  const activePool = wordData[currentWeekTab];
  document.getElementById('listHeader').textContent = `${currentWeekTab} 리스트 (${activePool.length}개)`;
  const el = document.getElementById('wordListEl');
  el.innerHTML = activePool.map(w =>
    `<div class="word-row">
      <span class="w-en">${w.en}</span>
      <span class="w-ko">${w.ko}</span>
    </div>`
  ).join('');
}

function startMode(mode) {
  initAudio();
  modeType = mode;
  const activePool = wordData[currentWeekTab];
  currentWords = shuffle([...activePool]);
  idx = 0; score = 0; reports = []; lock = false;
  showScreen('gameScreen'); renderQ();
}

function shuffle(a) {
  for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function renderQ() {
  lock = false;
  const w = currentWords[idx];
  const activePool = wordData[currentWeekTab];
  document.getElementById('gameBar').style.width = ((idx+1)/currentWords.length*100)+'%';
  
  const titleMap = {

  document.getElementById('gameTitle').textContent = `[${currentWeekTab}] ` + (titleMap[modeType] || '학습');

      <button class="action-btn" id="checkBtn" onclick="checkSuper()">정답 확인</button>
      <div class="answer-box" id="ansBox">
        <div style="font-size:12px;color:var(--yellow);font-weight:700;margin-bottom:4px">정답 교재 표기</div>
        <h3>${w.ko}</h3>
        <button class="action-btn" style="margin-top:12px;background:var(--green);padding:11px" onclick="moveNext()">다음 →</button>
      </div>`;
    setTimeout(() => { try { document.getElementById('si')?.focus(); } catch(e){} }, 250);
    speak(w.en);
  }
  else if (modeType === 'super_ko_en') {
    qSide = 'ko';
    area.innerHTML = `
      <div class="card-box">
        <div class="card-hint">영어 단어/숙어를 입력하세요</div>
        <div class="card-word" style="font-size:20px; font-weight:500; word-break:keep-all;">${w.ko}</div>
      </div>
      <div class="feedback-row" id="fb"></div>
      <input class="blank-input" id="si" type="text" placeholder="정답을 모르겠으면 바로 확인을 누르세요" autocomplete="off" spellcheck="false" onkeyup="if(event.key==='Enter')checkSuper()">
      <button class="action-btn" id="checkBtn" onclick="checkSuper()">정답 확인</button>
      <div class="answer-box" id="ansBox">
        <div style="font-size:12px;color:var(--yellow);font-weight:700;margin-bottom:4px">정답 교재 표기</div>
        <h3>${w.en}</h3>
        <button class="action-btn" style="margin-top:12px;background:var(--green);padding:11px" onclick="moveNext()">다음 →</button>
      </div>`;
    setTimeout(() => { try { document.getElementById('si')?.focus(); } catch(e){} }, 250);
  }
  else if (modeType === 'quiz_en_ko') {
    const distractors = shuffle(activePool.filter(x=>x.en!==w.en)).slice(0,3).map(x=>x.ko);
    const opts = shuffle([...new Set([w.ko, ...distractors])]);
    area.innerHTML = `
      <div class="card-box">
        <div class="card-hint">올바른 뜻을 고르세요</div>
        <div class="card-word" style="font-size:24px;">${w.en} <button class="tts-btn" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button></div>
      </div>
      <div class="quiz-opts" id="qOpts"></div>`;
    const el = document.getElementById('qOpts');
    opts.forEach(o => {
      const b = document.createElement('div');
      b.className = 'qopt'; b.textContent = o;
      if (o===w.ko) b.id = 'correctOpt';
      b.onclick = () => { handleQuizSelect(b, o, w.ko); };
      el.appendChild(b);
    });
    speak(w.en);
  }
  else if (modeType === 'quiz_ko_en') {
    const distractors = shuffle(activePool.filter(x=>x.en!==w.en)).slice(0,3).map(x=>x.en);
    const opts = shuffle([...new Set([w.en, ...distractors])]);
    area.innerHTML = `
      <div class="card-box">
        <div class="card-hint">올바른 단어/숙어를 고르세요</div>
        <div class="card-word" style="font-size:20px; font-weight:500; word-break:keep-all;">${w.ko}</div>
      </div>
      <div class="quiz-opts" id="qOpts"></div>`;
    const el = document.getElementById('qOpts');
    opts.forEach(o => {
      const b = document.createElement('div');
      b.className = 'qopt'; b.textContent = o;
      if (o===w.en) b.id = 'correctOpt';
      b.onclick = () => { handleQuizSelect(b, o, w.en); };
      el.appendChild(b);
    });
  }
}

function cleanText(str) {
  if(!str) return '';
  return str.toLowerCase().replace(/['"’`_➔~.,?!\s\(\)]/g, '');
}

function checkSimilarity(user, target) {
  const u = cleanText(user);
  const t = cleanText(target);
  if (!u || !t) return false;
  if (u === t) return true; 

  if (t.length >= 2 && u.length <= 1) return false;

  let matchCount = 0;
  for (let i = 0; i < u.length; i++) {
    if (t.includes(u[i])) {
      matchCount++;
    }
  }

  const threshold = t.length / 2;
  return matchCount >= threshold;
}

function checkSuper() {
  if (lock) return;
  const inp = document.getElementById('si');
  if(!inp) return;
  
  const rawVal = inp.value.trim();
  const w = currentWords[idx];
  
  if (rawVal === "") {
    lock = true;
    inp.classList.add('wrong');
    playBeep(false);
    
    document.getElementById('checkBtn').style.display = 'none';
    inp.disabled = true;
    document.getElementById('ansBox').style.width = '100%';
    document.getElementById('ansBox').style.display = 'block';
    
    reports.push({ en: w.en, ko: w.ko, ok: false });
    return;
  }

  let ok = false;
  if (qSide === 'en') {
    const correctMeanings = w.ko.split(/[\/,]/);
    ok = correctMeanings.some(mean => checkSimilarity(rawVal, mean));
  } else {
    ok = checkSimilarity(rawVal, w.en);
  }

  lock = true;

  if (ok) {
    inp.classList.add('correct'); 
    playBeep(true); 
    reports.push({ en: w.en, ko: w.ko, ok: true });
    setTimeout(moveNext, 520);
  } else {
    document.getElementById('checkBtn').style.display = 'none';
    inp.disabled = true;
    inp.classList.add('wrong'); 
    playBeep(false);
    reports.push({ en: w.en, ko: w.ko, ok: false });
    
    document.getElementById('ansBox').style.width = '100%';
    document.getElementById('ansBox').style.display = 'block';
    if (qSide === 'ko') speak(w.en);
  }
}

/* ★ 객관식 모드 사운드 및 깜빡임 연동 통제 함수 ★ */
function handleQuizSelect(element, selectedOption, correctOption) {
  if (lock) return;
  lock = true;
  
  const isCorrect = (selectedOption === correctOption);
  element.classList.add(isCorrect ? 'correct' : 'wrong');
  playBeep(isCorrect);
  
  if (isCorrect) {
    // 맞았을 때는 초록색 깜빡임 애니메이션(0.5초) 후 자동으로 매끄럽게 전환
    reports.push({ en: currentWords[idx].en, ko: currentWords[idx].ko, ok: true });
    setTimeout(moveNext, 520);
  } else {
    // 틀렸을 때는 빨간색 깜빡임 연출 후 숨어있던 진짜 정답 보기를 노란색으로 강조 노출
    document.getElementById('correctOpt')?.classList.add('reveal');
    reports.push({ en: currentWords[idx].en, ko: currentWords[idx].ko, ok: false });
    
    // 오답 시에는 정답을 눈으로 식별하고 다음 문제를 수동으로 풀 수 있게 버튼 박스 생성 후 고정
    const area = document.getElementById('gameArea');
    const nextBtnBox = document.createElement('div');
    nextBtnBox.style.marginTop = "16px";
    nextBtnBox.innerHTML = `<button class="action-btn" style="background:var(--green);" onclick="moveNext()">다음 →</button>`;
    area.appendChild(nextBtnBox);
    
    if (modeType === 'quiz_ko_en') speak(currentWords[idx].en);
  }
}

function moveNext() {
  if (reports.length <= idx) return; 
  idx++;
  if (idx < currentWords.length) { renderQ(); }
  else { showResult(); }
}

function showResult() {
  showScreen('resultScreen');
  const trueAnswersCount = reports.filter(r => r.ok).length;
  const pct = Math.round((trueAnswersCount / currentWords.length) * 100);
  
  document.getElementById('resPct').textContent = pct+'%';
  document.getElementById('resScore').textContent = `${trueAnswersCount} / ${currentWords.length} 정답`;
  document.getElementById('reportTable').innerHTML = reports.map(r =>
    `<tr><td>${r.en}</td><td style="color:var(--text2);font-size:12px">${r.ko}</td><td class="${r.ok?'ok':'ng'}">${r.ok?'○':'×'}</td></tr>`
  ).join('');
}
