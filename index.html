<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>가은이의 단어공부 Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  :root {
    --bg: #F7F6F2; --bg2: #EEECEA; --surface: #FFFFFF; --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.15); --text: #1A1A1A; --text2: #666; --text3: #999;
    --accent: #4A3FC0; --accent-light: #EEEDFE; --accent-dark: #3C3489;
    --green: #3B6D11; --green-bg: #EAF3DE; --red: #A32D2D; --red-bg: #FCEBEB;
    --yellow: #E6B800; --yellow-bg: #FFF9C4;
    --radius: 16px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  #app { max-width: 480px; margin: 0 auto; padding: 0; min-height: 100vh; }
  .screen { display: none; padding: 20px 16px 40px; }
  .screen.active { display: block; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; padding-top: env(safe-area-inset-top, 12px); }
  .back-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); }
  .tts-btn { background: none; border: none; cursor: pointer; font-size: 24px; padding: 5px; vertical-align: middle; }
  .home-header { padding-top: calc(env(safe-area-inset-top, 12px) + 12px); margin-bottom: 28px; }
  .home-header h1 { font-size: 26px; font-weight: 700; }
  
  .voice-config { display: flex; gap: 10px; margin-bottom: 20px; background: var(--bg2); padding: 10px; border-radius: var(--radius-sm); }
  .voice-opt { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border2); background: #fff; cursor: pointer; text-align: center; font-size: 13px; font-weight: 700; }
  .voice-opt.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .week-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 20px; scrollbar-width: none; }
  .week-tab { flex-shrink: 0; padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border2); background: var(--surface); font-size: 13px; cursor: pointer; }
  .week-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .menu-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 18px 14px; cursor: pointer; transition: transform 0.1s; }
  .mc-label { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .mc-desc { font-size: 11px; color: var(--text3); }
  .test-card { grid-column: span 2; background: linear-gradient(135deg, #4A3FC0, #6c63ff); color: #fff; border: none; }
  .prog-track { height: 5px; background: var(--bg2); border-radius: 99px; margin-bottom: 24px; overflow: hidden; position: relative; }
  .prog-fill { height: 5px; background: var(--accent); width: 0%; transition: width 0.35s; }
  .timer { position: absolute; right: 0; top: -20px; font-size: 12px; font-weight: 700; color: var(--red); }
  .flash-box { background: var(--surface); border-radius: var(--radius); padding: 40px 20px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); }
  .question-text { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 10px; display: block; }
  .blank-input { width: 100%; padding: 16px; border: 2px solid var(--border2); border-radius: var(--radius-sm); outline: none; margin-bottom: 15px; text-align: center; font-size: 20px; font-weight: 700; }
  .blank-input.correct { border-color: var(--green); background: var(--green-bg); }
  .blank-input.wrong { border-color: var(--red); background: var(--red-bg); }
  .quiz-opt { padding: 16px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); margin-bottom: 8px; cursor: pointer; font-weight: 500; }
  .quiz-opt.correct { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .quiz-opt.wrong { background: var(--red-bg); color: var(--red); border-color: var(--red); }
  .quiz-opt.is-answer { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow); }
  .save-btn { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; }
  .backup-group { display: flex; gap: 8px; margin-top: 10px; }
  .backup-btn { flex: 1; padding: 12px; font-size: 12px; border-radius: 8px; border: 1px solid var(--border2); background: #fff; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div id="home" class="screen active">
    <div class="home-header"><h1>단어 공부 Pro</h1></div>
    <div class="voice-config">
      <div id="voice-f" class="voice-opt active" onclick="setVoice('female')">👩 여성 음성</div>
      <div id="voice-m" class="voice-opt" onclick="setVoice('male')">👨 남성 음성</div>
    </div>
    <div class="week-scroll" id="weekTabs"></div>
    <div class="menu-grid">
      <div class="menu-card test-card" onclick="startTest()">🔥 <div class="mc-label">10분 실전 테스트</div><div class="mc-desc">랜덤 유형 + 사운드 + 정오표</div></div>
      <div class="menu-card" style="grid-column: span 2; background: var(--accent-light); border: 2px solid var(--accent);" onclick="startMode('super')">🚀 <div class="mc-label">플래시 주관식 (한/영 랜덤)</div><div class="mc-desc">문제보고 정답 쓰기 (틀리면 재도전)</div></div>
      <div class="menu-card" onclick="startMode('quiz')">✅ <div class="mc-label">객관식 퀴즈</div><div class="mc-desc">뜻 찾기</div></div>
      <div class="menu-card" onclick="startReview()">🔁 <div class="mc-label">오답 복습</div><div class="mc-desc" id="wrongCountLabel">틀린 단어</div></div>
    </div>
    <button class="save-btn" style="background:var(--bg2); color:var(--text2); margin-top:30px" onclick="showUpload()">📤 단어 데이터 관리</button>
  </div>

  <div id="uploadScreen" class="screen">
    <div class="header"><button class="back-btn" onclick="showHome()">←</button><h2>데이터 관리</h2></div>
    <textarea id="wordTextarea" class="blank-input" style="min-height:180px; text-align:left; font-size:14px;" placeholder="영어,한글 형식으로 입력"></textarea>
    <input type="text" id="weekNameInput" class="blank-input" placeholder="주차 이름 (예: 8주차)">
    <button class="save-btn" onclick="saveWords()">단어 추가/수정</button>
    <div style="margin-top:40px; padding-top:20px; border-top:1px solid var(--border2);">
      <h3 style="font-size:14px; margin-bottom:10px;">기기 간 데이터 이동</h3>
      <div class="backup-group">
        <button class="backup-btn" onclick="exportData()">📤 전체 내보내기</button>
        <button class="backup-btn" onclick="importData()">📥 가져오기</button>
      </div>
    </div>
    <button class="save-btn" style="background:var(--red); margin-top:40px" onclick="resetData()">🚨 모든 데이터 초기화</button>
  </div>

  <div id="gameScreen" class="screen">
    <div class="header"><button class="back-btn" onclick="confirmExit()">←</button><h2 id="gameTitle">학습 중</h2></div>
    <div class="prog-track"><div id="gameBar" class="prog-fill"></div><div id="timerDisplay" class="timer"></div></div>
    <div id="gameArea"></div>
  </div>

  <div id="resultScreen" class="screen">
    <div class="header"><h2>결과 확인</h2></div>
    <div style="text-align:center; padding:20px 0">
      <div id="resPct" style="font-size:48px; font-weight:700; color:var(--accent)">0%</div>
      <div id="resScore" style="font-weight:700; margin-top:5px">0 / 0</div>
    </div>
    <table style="width:100%; border-collapse: collapse; font-size:14px;">
      <tbody id="reportContent"></tbody>
    </table>
    <button class="save-btn" style="margin-top:30px" onclick="showHome()">홈으로</button>
  </div>
</div>

<script>
let allWeeks = JSON.parse(localStorage.getItem('vocabWeeks') || '{}');
let wrongWords = JSON.parse(localStorage.getItem('vocabWrong') || '[]');
let currentWeek = Object.keys(allWeeks)[0] || '';
let currentWords = [], idx = 0, score = 0, isTest = false, timer = null, lock = false;
let currentModeType = '', testReports = [], questionSide = 'en';
let selectedVoiceType = localStorage.getItem('prefVoice') || 'female';

// 오디오 컨텍스트 초기화
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function init() { renderWeekTabs(); updateWrongLabel(); setVoice(selectedVoiceType); }
function persist() { localStorage.setItem('vocabWeeks', JSON.stringify(allWeeks)); localStorage.setItem('vocabWrong', JSON.stringify(wrongWords)); }
function resetData() { if(confirm("데이터를 삭제하시겠습니까?")) { localStorage.clear(); location.reload(); } }
function renderWeekTabs() {
    const el = document.getElementById('weekTabs'); el.innerHTML = '';
    Object.keys(allWeeks).forEach(w => {
        const b = document.createElement('button');
        b.className = 'week-tab' + (w === currentWeek ? ' active' : '');
        b.textContent = `${w} (${allWeeks[w].length})`;
        b.onclick = () => { currentWeek = w; renderWeekTabs(); };
        el.appendChild(b);
    });
}
function updateWrongLabel() { document.getElementById('wrongCountLabel').textContent = `오답 복습 (${wrongWords.length})`; }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
function showHome() { clearInterval(timer); showScreen('home'); updateWrongLabel(); renderWeekTabs(); }
function showUpload() { document.getElementById('wordTextarea').value = ''; showScreen('uploadScreen'); }
function confirmExit() { if(confirm("종료하시겠습니까?")) showHome(); }

function saveWords() {
    const raw = document.getElementById('wordTextarea').value.trim();
    const name = document.getElementById('weekNameInput').value.trim() || (Object.keys(allWeeks).length + 1) + "주차";
    const parsed = raw.split('\n').map(l => {
        const p = l.split(','); return { en: p[0]?.trim(), ko: p[1]?.trim() };
    }).filter(w => w.en && w.ko);
    if(parsed.length) { allWeeks[name] = parsed; currentWeek = name; persist(); showHome(); }
}

function exportData() {
    const dataStr = JSON.stringify(allWeeks);
    const t = document.createElement('textarea'); t.value = dataStr; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
    alert("데이터가 복사되었습니다! 카톡으로 보내서 아이폰에 붙여넣으세요.");
}

function importData() {
    const code = prompt("내보낸 코드를 붙여넣으세요.");
    if(!code) return;
    try {
        allWeeks = JSON.parse(code); persist(); location.reload();
    } catch(e) { alert("잘못된 데이터입니다."); }
}

function setVoice(type) {
    selectedVoiceType = type; localStorage.setItem('prefVoice', type);
    document.getElementById('voice-f').classList.toggle('active', type === 'female');
    document.getElementById('voice-m').classList.toggle('active', type === 'male');
}

function speak(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    const voices = window.speechSynthesis.getVoices();
    const target = voices.find(v => {
        const isF = selectedVoiceType === 'female';
        return v.lang.includes('en') && (isF ? v.name.includes('Google') && !v.name.includes('Male') || v.name.includes('Samantha') : v.name.includes('Male') || v.name.includes('Daniel'));
    });
    if(target) msg.voice = target;
    msg.rate = 0.85; msg.pitch = 1.05;
    window.speechSynthesis.speak(msg);
}

function playBeep(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    if(type === 'correct') {
        [523.25, 659.25, 783.99].forEach((f, i) => {
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(f, now + i*0.1);
            g.gain.setValueAtTime(0, now + i*0.1);
            g.gain.linearRampToValueAtTime(0.1, now + i*0.1 + 0.02);
            g.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(now + i*0.1); osc.stop(now + i*0.1 + 0.1);
        });
    } else {
        const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, now);
        g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0.01, now + 0.5);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.5);
    }
}

function startMode(mode) {
    if(!currentWeek) return alert("단어를 등록하세요.");
    isTest = false; currentModeType = mode;
    currentWords = [...allWeeks[currentWeek]].sort(()=>0.5-Math.random());
    idx = 0; score = 0; testReports = [];
    showScreen('gameScreen'); renderQuestion();
}

function startTest() {
    if(!currentWeek) return alert("단어를 등록하세요.");
    isTest = true; currentModeType = 'mix';
    currentWords = [...allWeeks[currentWeek]].sort(() => Math.random() - 0.5);
    idx = 0; score = 0; testReports = [];
    showScreen('gameScreen'); 
    let timeLeft = 600;
    timer = setInterval(() => {
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timerDisplay').textContent = `${m}:${s<10?'0'+s:s}`;
        if(--timeLeft < 0) { clearInterval(timer); finishTest(); }
    }, 1000);
    renderQuestion();
}

function startReview() {
    if(!wrongWords.length) return alert("틀린 단어가 없습니다.");
    isTest = false; currentModeType = 'super';
    currentWords = [...wrongWords].sort(()=>0.5-Math.random());
    idx = 0; score = 0; testReports = [];
    showScreen('gameScreen'); renderQuestion();
}

function renderQuestion() {
    lock = false; const area = document.getElementById('gameArea'); area.innerHTML = '';
    const w = currentWords[idx];
    document.getElementById('gameBar').style.width = ((idx+1)/currentWords.length*100) + '%';
    let mode = (currentModeType === 'mix') ? (Math.random() > 0.5 ? 'super' : 'quiz') : currentModeType;

    if(mode === 'super') {
        questionSide = Math.random() > 0.5 ? 'en' : 'ko';
        area.innerHTML = `
            <div class="flash-box">
                <span class="type-label">${questionSide==='en'?'뜻을 입력하세요':'영단어를 입력하세요'}</span>
                <span class="question-text">${questionSide==='en'?w.en:w.ko}</span>
                ${questionSide==='en' ? `<button class="tts-btn" onclick="speak('${w.en}')">🔊</button>` : ''}
            </div>
            <div id="feedback" style="min-height:30px; text-align:center;"></div>
            <input type="text" id="sInput" class="blank-input" placeholder="정답 입력" onkeyup="if(event.key==='Enter') checkSuper()">
            <button id="checkBtn" class="save-btn" onclick="checkSuper()">정답 확인</button>
            <div id="answerInfo" style="display:none; margin-top:15px; text-align:center; padding:15px; background:var(--bg2); border-radius:var(--radius-sm);">
                <h2 style="color:var(--accent)">${questionSide==='en'?w.ko:w.en}</h2>
                <button class="save-btn" style="margin-top:10px; background:var(--green);" onclick="moveNext()">다음으로</button>
            </div>`;
        setTimeout(()=>document.getElementById('sInput').focus(), 300);
        if(questionSide==='en') speak(w.en);
    } else {
        const pool = allWeeks[currentWeek] || [];
        const others = pool.filter(x=>x.en!==w.en).sort(()=>0.5-Math.random()).slice(0,3).map(x=>x.ko);
        const opts = [...new Set([w.ko, ...others])].sort(()=>0.5-Math.random());
        area.innerHTML = `<div class="quiz-word-box" style="text-align:center; padding:30px; background:#fff; border-radius:16px; border:1px solid var(--border); margin-bottom:20px;">
            <h1 style="color:var(--accent)">${w.en} <button class="tts-btn" onclick="speak('${w.en}')">🔊</button></h1>
        </div><div id="qOpts"></div>`;
        opts.forEach(o => {
            const b = document.createElement('div'); b.className = 'quiz-opt'; b.textContent = o;
            if(o === w.ko) b.id = "correctOpt";
            b.onclick = () => {
                if(lock) return; lock = true;
                const ok = (o === w.ko);
                if(ok) { b.classList.add('correct'); playBeep('correct'); }
                else { b.classList.add('wrong'); document.getElementById('correctOpt').classList.add('is-answer'); playBeep('wrong'); }
                handleAns(ok, o);
            };
            document.getElementById('qOpts').appendChild(b);
        });
        speak(w.en);
    }
}

function checkSuper() {
    if(lock) return;
    const inp = document.getElementById('sInput'); const val = inp.value.trim().toLowerCase();
    const w = currentWords[idx];
    const isCorrect = (questionSide==='en') ? w.ko.split(',').map(s=>s.trim().toLowerCase()).some(ans=>val.includes(ans)) : (val === w.en.toLowerCase());
    if(isCorrect) {
        lock = true; inp.classList.add('correct'); playBeep('correct');
        if(questionSide==='ko') speak(w.en);
        handleAns(true, val);
    } else {
        inp.classList.add('wrong'); playBeep('wrong');
        if(!wrongWords.find(x=>x.en===w.en)) { wrongWords.push(w); persist(); updateWrongLabel(); }
        setTimeout(() => { inp.classList.remove('wrong'); inp.value = ''; inp.focus(); document.getElementById('feedback').innerHTML = `<button onclick="showHint()" style="color:var(--text3); font-size:12px; border:none; background:none; text-decoration:underline;">정답 보기</button>`; }, 1200);
    }
}

function showHint() {
    document.getElementById('checkBtn').style.display = 'none';
    document.getElementById('answerInfo').style.display = 'block';
    document.getElementById('sInput').disabled = true;
    speak(currentWords[idx].en);
}

function handleAns(isCorrect, userAns = "") {
    const w = currentWords[idx];
    if(isCorrect) { score++; wrongWords = wrongWords.filter(x=>x.en!==w.en); }
    else { if(!wrongWords.find(x=>x.en===w.en)) wrongWords.push(w); }
    persist();
    if(isTest) testReports.push({ word: w.en, isCorrect });
    setTimeout(moveNext, isCorrect ? 800 : 2000);
}

function moveNext() {
    if(++idx < currentWords.length) renderQuestion();
    else isTest ? finishTest() : showHome();
}

function finishTest() {
    clearInterval(timer); showScreen('resultScreen');
    const pct = Math.round((score/currentWords.length)*100);
    document.getElementById('resPct').textContent = pct + "%";
    document.getElementById('resScore').textContent = `${score} / ${currentWords.length}`;
    const cont = document.getElementById('reportContent'); cont.innerHTML = '';
    testReports.forEach(r => { cont.innerHTML += `<tr style="border-bottom:1px solid var(--border)"><td style="padding:10px">${r.word}</td><td style="padding:10px; color:${r.isCorrect?'var(--green)':'var(--red)'}">${r.isCorrect?'○':'×'}</td></tr>`; });
}
init();
</script>
</body>
</html>
